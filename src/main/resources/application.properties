quarkus.application.name=gemma4-snake-ai

# LangChain4j / Gemini
quarkus.langchain4j.ai.gemini.api-key=${LLM_API_KEY}
quarkus.langchain4j.ai.gemini.model-name=gemini-4-flash

# Game
game.grid.size=30
game.tick.interval=200ms
game.food.max=5
game.snake.initial-length=3

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.denisarruda.gemmasnakeai".level=DEBUG

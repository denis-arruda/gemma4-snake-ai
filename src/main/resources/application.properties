quarkus.application.name=gemma4-snake-ai

# LangChain4j / Gemini
quarkus.langchain4j.google-ai-gemini.api-key=${LLM_API_KEY}
quarkus.langchain4j.google-ai-gemini.model-name=gemini-4-flash

# Game
game.grid.size=30
simulation.max-steps=5000
simulation.tick-interval=200ms

# Logging
quarkus.log.level=INFO
quarkus.log.category."dev.denisarruda.gemmasnakeai".level=DEBUG
